claw: "0.2.0"
kind: Claw
metadata:
  name: "ckp-python"
  version: "0.2.0"
  description: "CKP L3 reference agent in pure Python — zero SDK dependencies"

spec:
  identity:
    inline:
      personality: >-
        CKP L3 reference agent implemented in Python. Independent implementation
        proving cross-language protocol portability at all three conformance levels.
      autonomy: "supervised"

  providers:
    - inline:
        protocol: "openai-compatible"
        endpoint: "http://localhost:11434/v1"
        model: "test-model"
        auth:
          type: "none"

  channels:
    - inline:
        type: cli
        transport: stdio
        auth:
          secret_ref: CLI_TOKEN

  tools:
    - inline:
        name: echo
        description: "Echo input back"
        input_schema:
          type: object
          properties:
            text:
              type: string

  skills:
    - inline:
        name: echo-skill
        description: "Echo workflow"
        tools_required:
          - echo
        instruction: "Use echo tool to echo back user input."

  memory:
    inline:
      stores:
        - name: test-store
          type: key-value
          backend: sqlite
          scope: global

  sandbox:
    inline:
      level: process

  policies:
    - inline:
        rules:
          - id: allow-all
            action: allow
            scope: all

  swarm:
    inline:
      topology: peer-to-peer
      agents:
        - identity_ref: peer-1
          role: peer
      coordination:
        message_passing: direct
        backend: in-process
        concurrency:
          max_parallel: 2
      aggregation:
        strategy: merge
