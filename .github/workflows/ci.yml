name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coherence:
    name: Spec Coherence Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coherence dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          sudo apt-get update
          sudo apt-get install -y jq perl

      - name: Run coherence audit
        run: bash tools/coherence-audit.sh spec reports

      - name: Upload coherence reports
        uses: actions/upload-artifact@v4
        with:
          name: coherence-reports
          path: |
            reports/coherence-report.md
            reports/coherence-report.json

  sdk:
    name: SDK Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm ci
        working-directory: sdk

      - name: Build SDK
        run: npm run build
        working-directory: sdk

      - name: Lint and format checks
        run: |
          npm run lint
          npm run format:check
        working-directory: sdk

      - name: Run SDK unit tests
        run: npm test
        working-directory: sdk

  conformance-smoke:
    name: Conformance Smoke (L1 + full suite)
    runs-on: ubuntu-latest
    needs: [sdk]
    steps:
      - name: Checkout clawkernel
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build SDK examples
        run: |
          npm ci
          npm run build:dev
        working-directory: sdk

      - name: Clone ckp-test (pinned)
        env:
          CKP_TEST_REF: eb73dd2f0e8b073210d4d38f02a50bb83c8805ae
        run: |
          git clone https://github.com/angelgalvisc/ckp-test.git ../ckp-test
          git -C ../ckp-test checkout "$CKP_TEST_REF"

      - name: Build ckp-test
        run: |
          npm ci
          npm run build
        working-directory: ../ckp-test

      - name: Run L1 conformance against reference bridge manifest
        run: |
          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/sdk/dist/examples/l1-agent.js" \
            --manifest "$GITHUB_WORKSPACE/reference/ckp-bridge/claw.yaml" \
            --level 1
        working-directory: ../ckp-test

      - name: Run full suite against L3 SDK example
        run: |
          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/sdk/dist/examples/l3-agent.js" \
            --manifest "$GITHUB_WORKSPACE/sdk/examples/l3.claw.yaml"
        working-directory: ../ckp-test

      - name: Build bridge-common
        run: npm ci && npm run build
        working-directory: reference/bridge-common

      - name: Build nullclaw-bridge
        run: npm ci && npm run build
        working-directory: reference/nullclaw-bridge

      - name: Run full suite against nullclaw-bridge
        run: |
          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/reference/nullclaw-bridge/dist/bridge.js" \
            --manifest "$GITHUB_WORKSPACE/reference/nullclaw-bridge/nullclaw.claw.yaml"
        working-directory: ../ckp-test

      - name: Run full suite against Python reference agent
        run: |
          node dist/cli.js run \
            --target "python3 $GITHUB_WORKSPACE/reference/ckp-python/agent.py" \
            --manifest "$GITHUB_WORKSPACE/reference/ckp-python/claw.yaml"
        working-directory: ../ckp-test
