name: Release Gate

on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          sudo apt-get update
          sudo apt-get install -y jq perl

      - name: Verify changelog contains tag version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "\[$VERSION\]" CHANGELOG.md

      - name: Coherence gate
        run: bash tools/coherence-audit.sh spec reports

      - name: SDK build + quality checks
        run: |
          npm ci
          npm run build
          npm run lint
          npm run format:check
          npm test
        working-directory: sdk

      - name: Build SDK examples (for conformance targets)
        run: npm run build:dev
        working-directory: sdk

      - name: Clone ckp-test (pinned)
        env:
          CKP_TEST_REF: d2e1da3e489f2ba5c3c35688d2cd3191fb6a2e7e
        run: |
          git clone https://github.com/angelgalvisc/ckp-test.git ../ckp-test
          git -C ../ckp-test checkout "$CKP_TEST_REF"

      - name: Build ckp-test
        run: |
          npm ci
          npm run build
        working-directory: ../ckp-test

      - name: Build ckp-bridge
        run: npm ci && npm run build
        working-directory: reference/ckp-bridge

      - name: Conformance smoke
        run: |
          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/reference/ckp-bridge/dist/bridge.js" \
            --manifest "$GITHUB_WORKSPACE/reference/ckp-bridge/claw.yaml" \
            --level 1

          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/sdk/dist/examples/l3-agent.js" \
            --manifest "$GITHUB_WORKSPACE/sdk/examples/l3.claw.yaml"
        working-directory: ../ckp-test

      - name: Build bridge-common
        run: npm ci && npm run build
        working-directory: reference/bridge-common

      - name: Build nullclaw-bridge
        run: npm ci && npm run build
        working-directory: reference/nullclaw-bridge

      - name: Run full suite against nullclaw-bridge
        run: |
          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/reference/nullclaw-bridge/dist/bridge.js" \
            --manifest "$GITHUB_WORKSPACE/reference/nullclaw-bridge/nullclaw.claw.yaml"
        working-directory: ../ckp-test

      - name: Build nanoclaw-bridge
        run: npm ci && npm run build
        working-directory: reference/nanoclaw-bridge

      - name: Run full suite against nanoclaw-bridge
        run: |
          node dist/cli.js run \
            --target "node $GITHUB_WORKSPACE/reference/nanoclaw-bridge/dist/bridge.js" \
            --manifest "$GITHUB_WORKSPACE/reference/nanoclaw-bridge/nanoclaw.claw.yaml"
        working-directory: ../ckp-test

      - name: Run full suite against Python reference agent
        run: |
          node dist/cli.js run \
            --target "python3 $GITHUB_WORKSPACE/reference/ckp-python/agent.py" \
            --manifest "$GITHUB_WORKSPACE/reference/ckp-python/claw.yaml"
        working-directory: ../ckp-test
